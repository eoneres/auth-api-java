spring:
  application:
    name: auth-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: admin
    password: secret
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    com.auth: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html